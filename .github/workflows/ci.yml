name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Check for CI failure marker
        run: |
          if [ -f "SHOULD_FAIL" ]; then
            echo "::error::SHOULD_FAIL marker present — this PR is configured to fail CI"
            exit 1
          fi
          echo "No failure marker found. CI passes."
